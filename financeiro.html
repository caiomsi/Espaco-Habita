<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financeiro — Espaço Habita Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=12">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body data-page="financeiro">

  <!-- Mobile top bar -->
  <div class="mobile-topbar">
    <button id="sidebar-toggle" aria-label="Abrir menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <span class="mobile-topbar-title">Espaço Habita</span>
  </div>

  <div class="app-layout">

    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar" aria-label="Menu principal">
      <div class="sidebar-brand">
        <span class="sidebar-brand-name">Espaço Habita</span>
        <span class="sidebar-brand-sub">Painel Admin</span>
      </div>
      <div class="sidebar-nav">
        <a href="dashboard.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8"  y1="2" x2="8"  y2="6"/>
            <line x1="3"  y1="10" x2="21" y2="10"/>
          </svg>
          Calendário
        </a>
        <a href="clients.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          Clientes
        </a>
        <a href="rooms.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Salas
        </a>
        <a href="requests.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          Solicitações
        </a>
        <a href="expenses.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
          Despesas
        </a>
        <a href="financeiro.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          Financeiro
        </a>
      </div>
      <div class="sidebar-footer">
        <p class="sidebar-user" id="sidebar-user"></p>
        <button class="btn btn-ghost btn-sm" onclick="window.Auth.logout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sair
        </button>
      </div>
    </nav>

    <!-- Main content -->
    <main class="main-content">
      <div class="page-header page-header--col">
        <div class="page-header-left">
          <h1 class="page-title">Financeiro</h1>
        </div>
        <div class="cal-toolbar">
          <button id="prev-month" class="btn btn-ghost btn-sm" aria-label="Mês anterior">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <span id="period-label" class="week-label"></span>
          <button id="next-month" class="btn btn-ghost btn-sm" aria-label="Próximo mês">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
          <button id="this-month-btn" class="btn btn-ghost btn-sm">Este mês</button>
        </div>
      </div>

      <div class="page-body">
        <div class="fin-stat-grid">
          <div class="fin-stat-card">
            <p class="fin-stat-label">Receita</p>
            <p class="fin-stat-value" id="fin-receita">—</p>
          </div>
          <div class="fin-stat-card">
            <p class="fin-stat-label">Descontos concedidos</p>
            <p class="fin-stat-value" id="fin-descontos">—</p>
          </div>
          <div class="fin-stat-card">
            <p class="fin-stat-label">Despesas</p>
            <p class="fin-stat-value" id="fin-despesas">—</p>
          </div>
          <div class="fin-stat-card" id="fin-saldo-card">
            <p class="fin-stat-label">Saldo</p>
            <p class="fin-stat-value" id="fin-saldo">—</p>
          </div>
        </div>

        <div class="fin-breakdown-grid">
          <div class="fin-breakdown-col">
            <h2 class="fin-breakdown-title">Despesas por categoria</h2>
            <div id="fin-expense-breakdown">
              <div class="loading-state">Carregando…</div>
            </div>
          </div>
          <div class="fin-breakdown-col">
            <h2 class="fin-breakdown-title">Receita por sala</h2>
            <div id="fin-room-breakdown">
              <div class="loading-state">Carregando…</div>
            </div>
          </div>
        </div>
      </div>
    </main>

  </div><!-- .app-layout -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase.js?v=7"></script>
  <script src="js/auth.js?v=7"></script>
  <script src="js/ui.js?v=8"></script>
  <script src="js/financeiro.js?v=1"></script>
</body>
</html>
