<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário — Espaço Habita Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=9">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body data-page="dashboard">

  <!-- Mobile top bar -->
  <div class="mobile-topbar">
    <button id="sidebar-toggle" aria-label="Abrir menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <span class="mobile-topbar-title">Espaço Habita</span>
  </div>

  <div class="app-layout">

    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar" aria-label="Menu principal">
      <div class="sidebar-brand">
        <span class="sidebar-brand-name">Espaço Habita</span>
        <span class="sidebar-brand-sub">Painel Admin</span>
      </div>
      <div class="sidebar-nav">
        <a href="dashboard.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8"  y1="2" x2="8"  y2="6"/>
            <line x1="3"  y1="10" x2="21" y2="10"/>
          </svg>
          Calendário
        </a>
        <a href="clients.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          Clientes
        </a>
        <a href="rooms.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Salas
        </a>
        <a href="requests.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          Solicitações
        </a>
      </div>
      <div class="sidebar-footer">
        <p class="sidebar-user" id="sidebar-user"></p>
        <button class="btn btn-ghost btn-sm" onclick="window.Auth.logout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sair
        </button>
      </div>
    </nav>

    <!-- Main content -->
    <main class="main-content">
      <div class="page-header page-header--col">
        <div class="page-header-left">
          <h1 class="page-title">Calendário</h1>
        </div>
        <div class="cal-toolbar">
          <button id="prev-week" class="btn btn-ghost btn-sm" aria-label="Semana anterior">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <span id="week-label" class="week-label"></span>
          <button id="next-week" class="btn btn-ghost btn-sm" aria-label="Próxima semana">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
          <button id="today-btn" class="btn btn-ghost btn-sm">Hoje</button>
          <button id="new-booking-btn" class="btn btn-primary btn-sm">+ Nova Reserva</button>
          <button id="new-series-btn" class="btn btn-ghost btn-sm">↻ Recorrência</button>
          <button id="block-room-btn" class="btn btn-ghost btn-sm">⊘ Bloquear sala</button>
          <a href="rooms.html" class="btn btn-ghost btn-sm">Salas</a>
        </div>
        <div id="room-context-bar" class="room-context-bar" hidden>
          <button type="button" id="room-back-btn" class="btn btn-ghost btn-sm">← Todas as salas</button>
          <h2 id="room-context-name" class="room-context-name"></h2>
          <div class="view-mode-pills" role="group" aria-label="Modo de visualização">
            <button type="button" class="view-mode-pill view-mode-pill--active" data-granularity="week">Semana</button>
            <button type="button" class="view-mode-pill" data-granularity="month">Mês</button>
          </div>
        </div>
      </div>

      <div class="page-body">
        <div class="cal-wrapper">
          <div id="calendar-grid">
            <div class="cal-loading">Carregando…</div>
          </div>
        </div>
      </div>
    </main>

  </div><!-- .app-layout -->

  <!-- Booking modal -->
  <div id="booking-modal" class="modal-overlay" hidden
       role="dialog" aria-modal="true" aria-labelledby="booking-modal-title">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="booking-modal-title">Nova Reserva</h2>
        <button class="modal-close" aria-label="Fechar">&times;</button>
      </div>
      <form id="booking-form" novalidate>
        <div class="form-field">
          <label for="bk-client">Cliente *</label>
          <div class="client-autocomplete-wrap">
            <input type="text" id="bk-client" name="client_name" required
                   placeholder="Digite o nome do cliente…" autocomplete="off">
            <input type="hidden" id="bk-client-id">
            <div id="client-suggestions" class="client-suggestions" hidden></div>
          </div>
          <p id="bk-client-phone-hint" class="client-phone-hint" hidden></p>
        </div>
        <div class="form-field">
          <label for="bk-room">Sala *</label>
          <select id="bk-room" name="room_id" required></select>
        </div>
        <!-- Hidden inputs — bookings.js reads these for the submit payload -->
        <input type="hidden" id="bk-start" name="starts_at">
        <input type="hidden" id="bk-end"   name="ends_at">

        <!-- Duration preset pills -->
        <div class="form-field">
          <label>Duração</label>
          <div class="duration-pills" id="bk-duration-pills">
            <button type="button" class="duration-pill" data-preset="1h">1h</button>
            <button type="button" class="duration-pill" data-preset="2h">2h</button>
            <button type="button" class="duration-pill" data-preset="half">Meio período</button>
            <button type="button" class="duration-pill" data-preset="day">Dia inteiro</button>
            <button type="button" class="duration-pill" data-preset="week">Semana</button>
          </div>
        </div>

        <!-- Display fields -->
        <div class="form-row bk-display-row">
          <div class="form-field">
            <label>Início *</label>
            <div class="bk-display-field bk-display-field--active" id="bk-start-display" data-field="start" tabindex="0" role="button" aria-label="Selecionar data e hora de início">
              <span class="bk-display-value bk-display-value--empty" id="bk-start-text">—</span>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:.5;flex-shrink:0">
                <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
            </div>
          </div>
          <div class="form-field">
            <label>Término *</label>
            <div class="bk-display-field" id="bk-end-display" data-field="end" tabindex="0" role="button" aria-label="Selecionar data e hora de término">
              <span class="bk-display-value bk-display-value--empty" id="bk-end-text">—</span>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:.5;flex-shrink:0">
                <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
            </div>
          </div>
        </div>

        <!-- Calendar + time list -->
        <div class="bk-picker-panel" id="bk-picker-panel">
          <div class="bk-calendar" id="bk-calendar"></div>
          <div class="bk-time-col">
            <div class="bk-time-col-header">Horário</div>
            <div class="bk-time-list" id="bk-time-list"></div>
          </div>
        </div>

        <!-- Live summary bar -->
        <div class="bk-summary-bar" id="bk-summary-bar">
          <span class="bk-summary-icon" id="bk-summary-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </span>
          <span class="bk-summary-text" id="bk-summary-text">Selecione sala, data e horário</span>
        </div>

        <div class="form-field">
          <label for="bk-status">Status</label>
          <select id="bk-status" name="status">
            <option value="confirmado">Confirmado</option>
            <option value="pendente">Pendente</option>
            <option value="cancelado">Cancelado</option>
            <option value="solicitado" disabled>Solicitado (via formulário público)</option>
            <option value="recusado"   disabled>Recusado</option>
          </select>
        </div>
        <div class="form-field">
          <label for="bk-rate-applied">
            Valor cobrado (R$)
            <a href="#" id="bk-rate-suggest" class="rate-suggest-link">Sugerir</a>
          </label>
          <input type="number" id="bk-rate-applied" name="rate_applied"
                 min="0" step="0.01" placeholder="0,00">
        </div>
        <div class="form-field">
          <label for="bk-notes">Observações</label>
          <textarea id="bk-notes" name="notes" rows="3"
                    placeholder="Notas internas, equipamentos, etc."></textarea>
        </div>
        <p id="booking-conflict-warning" class="form-warning" hidden></p>
        <p id="booking-error" class="form-error" hidden></p>
        <div class="modal-actions">
          <button type="button" id="booking-delete-btn" class="btn btn-danger" hidden>
            Excluir reserva
          </button>
          <button type="button" class="btn btn-ghost modal-close">Cancelar</button>
          <button type="submit" id="booking-save-btn" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Day zoom modal -->
  <div id="day-modal" class="modal-overlay" hidden
       role="dialog" aria-modal="true" aria-labelledby="day-modal-title">
    <div class="modal-box modal-box--wide">
      <div class="modal-header">
        <h2 id="day-modal-title"></h2>
        <button class="modal-close" aria-label="Fechar">&times;</button>
      </div>
      <div id="day-modal-body" class="day-view-body"></div>
      <div class="modal-actions" style="margin-top:.5rem;padding-top:.75rem;border-top:1px solid var(--border)">
        <button type="button" id="day-new-booking-btn" class="btn btn-primary btn-sm">+ Nova Reserva</button>
        <button type="button" class="btn btn-ghost btn-sm modal-close">Fechar</button>
      </div>
    </div>
  </div>

  <!-- Series modal (recurring booking creation / edit) -->
  <div id="series-modal" class="modal-overlay" hidden
       role="dialog" aria-modal="true" aria-labelledby="series-modal-title">
    <div class="modal-box modal-box--wide">
      <div class="modal-header">
        <h2 id="series-modal-title">Nova Recorrência</h2>
        <button class="modal-close" aria-label="Fechar">&times;</button>
      </div>
      <form id="series-form" novalidate>

        <div class="form-field">
          <label for="sr-client">Cliente *</label>
          <div class="client-autocomplete-wrap">
            <input type="text" id="sr-client" name="client_name" required
                   placeholder="Digite o nome do cliente…" autocomplete="off">
            <input type="hidden" id="sr-client-id">
            <div id="sr-client-suggestions" class="client-suggestions" hidden></div>
          </div>
        </div>

        <div class="form-field">
          <label for="sr-room">Sala *</label>
          <select id="sr-room" required>
            <option value="">— Selecione —</option>
          </select>
        </div>

        <div class="form-field">
          <label>Dias da semana *</label>
          <div class="sr-dow-grid">
            <label class="sr-dow-label"><input type="checkbox" id="sr-dow-0"> Seg</label>
            <label class="sr-dow-label"><input type="checkbox" id="sr-dow-1"> Ter</label>
            <label class="sr-dow-label"><input type="checkbox" id="sr-dow-2"> Qua</label>
            <label class="sr-dow-label"><input type="checkbox" id="sr-dow-3"> Qui</label>
            <label class="sr-dow-label"><input type="checkbox" id="sr-dow-4"> Sex</label>
            <label class="sr-dow-label"><input type="checkbox" id="sr-dow-5"> Sáb</label>
            <label class="sr-dow-label"><input type="checkbox" id="sr-dow-6"> Dom</label>
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="sr-start-time">Início *</label>
            <input type="time" id="sr-start-time" step="900" required>
          </div>
          <div class="form-field">
            <label for="sr-end-time">Término *</label>
            <input type="time" id="sr-end-time" step="900" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="sr-starts-on">Primeira ocorrência *</label>
            <input type="date" id="sr-starts-on" required>
          </div>
          <div class="form-field">
            <label for="sr-ends-on">Última ocorrência <span style="font-weight:400;color:var(--warm-400)">(opcional)</span></label>
            <input type="date" id="sr-ends-on">
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="sr-rate">Valor cobrado (R$)</label>
            <input type="number" id="sr-rate" min="0" step="0.01" placeholder="0,00">
          </div>
        </div>

        <div class="form-field">
          <label for="sr-notes">Observações</label>
          <textarea id="sr-notes" rows="2" placeholder="Notas internas…"></textarea>
        </div>

        <p id="series-error" class="form-error" hidden></p>
        <div id="sr-conflict-preview" class="sr-conflict-preview" hidden></div>

        <div class="modal-actions">
          <button type="button" class="btn btn-ghost modal-close">Cancelar</button>
          <button type="button" id="sr-check-btn" class="btn btn-ghost">Verificar conflitos</button>
          <button type="button" id="sr-create-btn" class="btn btn-primary" hidden>Criar recorrência</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Scope dialog: one occurrence vs. this and all future -->
  <div id="series-scope-modal" class="modal-overlay" hidden
       role="dialog" aria-modal="true" aria-labelledby="scope-modal-title">
    <div class="modal-box modal-box--narrow">
      <div class="modal-header">
        <h2 id="scope-modal-title">Editar recorrência</h2>
        <button class="modal-close" aria-label="Fechar">&times;</button>
      </div>
      <p id="scope-modal-desc" class="scope-modal-desc">Deseja editar apenas esta reserva ou esta e todas as seguintes?</p>
      <div class="modal-actions modal-actions--col">
        <button type="button" id="scope-only-this-btn" class="btn btn-ghost">Apenas esta ocorrência</button>
        <button type="button" id="scope-all-future-btn" class="btn btn-primary">Esta e as seguintes</button>
        <button type="button" class="btn btn-ghost btn-sm modal-close" style="align-self:center">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Blocked time modal -->
  <div id="blocked-modal" class="modal-overlay" hidden
       role="dialog" aria-modal="true" aria-labelledby="blocked-modal-title">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="blocked-modal-title">Bloquear Sala</h2>
        <button class="modal-close" aria-label="Fechar">&times;</button>
      </div>
      <form id="blocked-form" novalidate>
        <div class="form-field">
          <label for="bl-room">Sala *</label>
          <select id="bl-room" name="room_id" required></select>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label for="bl-start">Início *</label>
            <input type="datetime-local" id="bl-start" name="starts_at" required step="900">
          </div>
          <div class="form-field">
            <label for="bl-end">Término *</label>
            <input type="datetime-local" id="bl-end" name="ends_at" required step="900">
          </div>
        </div>
        <div class="form-field">
          <label for="bl-reason">Motivo</label>
          <input type="text" id="bl-reason" name="reason"
                 placeholder="Ex: Limpeza, manutenção, evento interno…">
        </div>
        <p id="blocked-error" class="form-error" hidden></p>
        <div class="modal-actions">
          <button type="button" id="blocked-delete-btn" class="btn btn-danger" hidden>
            Remover bloqueio
          </button>
          <button type="button" class="btn btn-ghost modal-close">Cancelar</button>
          <button type="submit" id="blocked-save-btn" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase.js?v=7"></script>
  <script src="js/auth.js?v=7"></script>
  <script src="js/ui.js?v=7"></script>
  <script src="js/overlap.js?v=10"></script>
  <script src="js/bookings.js?v=8"></script>
  <script src="js/bk-picker.js?v=7"></script>
  <script src="js/calendar.js?v=9"></script>
  <script src="js/blocked.js?v=7"></script>
  <script src="js/series.js?v=2"></script>
</body>
</html>
