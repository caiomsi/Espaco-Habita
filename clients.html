<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes — Espaço Habita Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=12">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body data-page="clients">

  <!-- Mobile top bar -->
  <div class="mobile-topbar">
    <button id="sidebar-toggle" aria-label="Abrir menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <span class="mobile-topbar-title">Espaço Habita</span>
  </div>

  <div class="app-layout">

    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar" aria-label="Menu principal">
      <div class="sidebar-brand">
        <span class="sidebar-brand-name">Espaço Habita</span>
        <span class="sidebar-brand-sub">Painel Admin</span>
      </div>
      <div class="sidebar-nav">
        <a href="dashboard.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8"  y1="2" x2="8"  y2="6"/>
            <line x1="3"  y1="10" x2="21" y2="10"/>
          </svg>
          Calendário
        </a>
        <a href="clients.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          Clientes
        </a>
        <a href="rooms.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Salas
        </a>
        <a href="requests.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          Solicitações
        </a>
        <a href="expenses.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
          Despesas
        </a>
        <a href="financeiro.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          Financeiro
        </a>
      </div>
      <div class="sidebar-footer">
        <p class="sidebar-user" id="sidebar-user"></p>
        <button class="btn btn-ghost btn-sm" onclick="window.Auth.logout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sair
        </button>
      </div>
    </nav>

    <!-- Main content -->
    <main class="main-content">
      <div class="page-header">
        <div class="page-header-left">
          <h1 class="page-title">Clientes</h1>
          <p class="page-sub">Perfis de clientes e planos recorrentes</p>
        </div>
        <button id="add-client-btn" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5"  y1="12" x2="19" y2="12"/>
          </svg>
          Adicionar Cliente
        </button>
      </div>
      <div class="page-body">
        <div id="clients-list" class="clients-grid">
          <div class="loading-state">Carregando…</div>
        </div>
      </div>
    </main>

  </div><!-- .app-layout -->

  <!-- Client modal (add / edit) -->
  <div id="client-modal" class="modal-overlay" hidden
       role="dialog" aria-modal="true" aria-labelledby="client-modal-title">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="client-modal-title">Novo Cliente</h2>
        <button class="modal-close" aria-label="Fechar">&times;</button>
      </div>
      <form id="client-form" novalidate>
        <div class="form-field">
          <label for="cl-name">Nome completo *</label>
          <input type="text" id="cl-name" name="name" required
                 placeholder="Ex: Maria Oliveira">
        </div>
        <div class="form-field">
          <label for="cl-phone">Telefone / WhatsApp</label>
          <input type="tel" id="cl-phone" name="phone"
                 placeholder="(34) 9 9999-9999">
        </div>
        <div class="form-field">
          <label for="cl-email">E-mail *</label>
          <input type="email" id="cl-email" name="email"
                 placeholder="cliente@email.com">
        </div>
        <div class="form-field">
          <label for="cl-notes">Observações</label>
          <textarea id="cl-notes" name="notes" rows="2"
                    placeholder="Notas internas sobre o cliente…"></textarea>
        </div>
        <p id="client-error" class="form-error" hidden></p>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost modal-close">Cancelar</button>
          <button type="submit" id="client-save-btn" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Plans modal -->
  <div id="plans-modal" class="modal-overlay" hidden
       role="dialog" aria-modal="true" aria-labelledby="plans-modal-title">
    <div class="modal-box" style="max-width:560px">
      <div class="modal-header">
        <h2 id="plans-modal-title">Planos</h2>
        <button class="modal-close" aria-label="Fechar">&times;</button>
      </div>

      <div id="plans-list" class="plans-list">
        <div class="loading-state" style="padding:1rem">Carregando…</div>
      </div>

      <!-- Add plan form -->
      <div class="plan-add-form">
        <p style="font-weight:600;font-size:.875rem">Adicionar Plano</p>
        <div class="form-field">
          <label for="pl-room">Sala *</label>
          <select id="pl-room"></select>
        </div>
        <div class="form-field">
          <label>Dias da semana *</label>
          <div class="days-checkboxes">
            <label class="day-label"><input type="checkbox" name="day" value="0"> Seg</label>
            <label class="day-label"><input type="checkbox" name="day" value="1"> Ter</label>
            <label class="day-label"><input type="checkbox" name="day" value="2"> Qua</label>
            <label class="day-label"><input type="checkbox" name="day" value="3"> Qui</label>
            <label class="day-label"><input type="checkbox" name="day" value="4"> Sex</label>
            <label class="day-label"><input type="checkbox" name="day" value="5"> Sáb</label>
            <label class="day-label"><input type="checkbox" name="day" value="6"> Dom</label>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label for="pl-start">Início *</label>
            <input type="time" id="pl-start" step="900">
          </div>
          <div class="form-field">
            <label for="pl-end">Término *</label>
            <input type="time" id="pl-end" step="900">
          </div>
        </div>
        <p id="plan-error" class="form-error" hidden></p>
        <div class="modal-actions" style="margin-top:.75rem;padding-top:.75rem">
          <button type="button" class="btn btn-ghost modal-close">Fechar</button>
          <button type="button" id="plan-save-btn" class="btn btn-primary">Salvar Plano</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase.js?v=7"></script>
  <script src="js/auth.js?v=7"></script>
  <script src="js/ui.js?v=8"></script>
  <script src="js/clients.js?v=7"></script>
</body>
</html>
