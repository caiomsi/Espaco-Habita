<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Espaço Habita Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=4">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body data-page="login">

  <div class="login-page">
    <div class="login-card">

      <div class="login-logo">
        <div class="login-logo-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <h1 class="login-title">Espaço Habita</h1>
        <p class="login-sub">Painel Administrativo</p>
      </div>

      <p id="login-error" class="login-error" hidden></p>

      <form id="login-form" class="login-form" novalidate>
        <div class="form-field">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" name="email"
                 autocomplete="email" required placeholder="seu@email.com">
        </div>
        <div class="form-field">
          <label for="login-password">Senha</label>
          <input type="password" id="login-password" name="password"
                 autocomplete="current-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary">Entrar</button>
      </form>

      <!-- DEV HINT: remove this block before launch -->
      <div class="dev-hint">
        <p><strong>Acesso temporário</strong></p>
        <p>admin@espacohabita.com.br</p>
        <p>Habita2024!</p>
      </div>
      <!-- /DEV HINT -->

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase.js?v=4"></script>
  <script src="js/auth.js?v=4"></script>
</body>
</html>
